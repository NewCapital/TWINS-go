# TWINS Regtest Configuration (Local Development/Testing)

# Network settings
network:
  port: 29333
  seeds: []
  maxPeers: 10
  testNet: false
  listenAddr: "127.0.0.1"
  externalIP: ""
  timeout: 10
  keepAlive: 30
  maxBandwidth: 0

# RPC server settings
rpc:
  enabled: true
  port: 29332
  host: "127.0.0.1"
  username: "twins"
  password: "twins"
  allowedIPs:
    - "127.0.0.1"
    - "::1"
  maxClients: 10
  timeout: 10

# Masternode settings
masternode:
  enabled: false
  privateKey: ""
  serviceAddr: ""
  mnConf: "masternode.conf"
  mnConfLock: true

# Logging settings
logging:
  level: "debug"
  format: "text"
  output: "./twins.log"
